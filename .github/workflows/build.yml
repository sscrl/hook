name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'
          cache-read-only: false

      - name: Check Android SDK
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la $ANDROID_SDK_ROOT/platforms/ 2>/dev/null || true
          ls -la $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null || true

      - name: Install missing SDK components
        run: |
          if [ ! -d "$ANDROID_SDK_ROOT/platforms/android-35" ]; then
            echo "Installing android-35 platform..."
            yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" 2>/dev/null || \
            $ANDROID_SDK_ROOT/tools/bin/sdkmanager "platforms;android-35" 2>/dev/null || \
            echo "SDK manager not found, relying on preinstalled SDK"
          else
            echo "android-35 platform already installed"
          fi
          if [ -z "$(ls -A $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null)" ]; then
            echo "Installing build-tools..."
            yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;35.0.0" 2>/dev/null || true
          else
            echo "build-tools already installed"
          fi

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "android.useAndroidX=true" >> gradle.properties 2>/dev/null || true

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Find and list APK
        id: find-apk
        run: |
          APK=$(find app/build -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then APK=$(find . -name "*.apk" 2>/dev/null | head -1); fi
          if [ -z "$APK" ]; then APK="./app/build/outputs/apk/debug/app-debug.apk"; fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          ls -lh "$APK" || echo "APK not found at $APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlyBypass-LSPatch-APK
          path: ${{ steps.find-apk.outputs.apk_path }}
          if-no-files-found: warn