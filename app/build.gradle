plugins {
    id 'com.android.application'
}

android {
    namespace 'com.fly.bypass'
    compileSdk 33

    defaultConfig {
        applicationId 'com.fly.bypass'
        minSdk 21
        targetSdk 30
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}